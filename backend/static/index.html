<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tyrion — Pantalla Control</title>
<link rel="stylesheet" href="/static/css/tyrion.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4EF;--surface:#FFFFFF;--ink:#1A2E2A;--ink2:#4A5E5A;--ink3:#8A9E9A;
  --green:#0F6E56;--green-bg:#E1F5EE;--green-bd:#9FE1CB;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-bd:#FAC775;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-bd:#F7C1C1;
  --bd:rgba(26,46,42,0.11);--bd2:rgba(26,46,42,0.20);
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
body{font-family:'Inter',system-ui,sans-serif;font-size:13px;color:var(--ink);background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* TOPBAR */
.topbar{background:var(--ink);color:#fff;display:flex;align-items:center;padding:0 16px;height:46px;flex-shrink:0;gap:2px}
.brand{font-size:15px;font-weight:600;margin-right:18px;letter-spacing:.2px;white-space:nowrap}
.brand small{font-size:10px;font-weight:400;opacity:.5;display:block;letter-spacing:.3px;margin-top:-3px}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.55);font-size:12px;padding:0 12px;height:46px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;transition:.12s;white-space:nowrap}
.nav-btn:hover,.nav-btn.active{color:#fff}
.nav-btn.active{border-bottom-color:rgba(255,255,255,.6)}
.nav-btn i{font-size:14px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chip-warn{background:var(--amber-bg);color:var(--amber);border:0.5px solid var(--amber-bd);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer}
.sdot{width:6px;height:6px;border-radius:50%;background:#5DCAA5;display:inline-block;flex-shrink:0}
.sys-info{font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap}
.btn-primary{background:var(--green);color:#fff;border:none;padding:5px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:4px;text-decoration:none;white-space:nowrap}
.btn-primary:hover{background:#085041}

/* STATS BAR */
.stats-bar{background:var(--surface);border-bottom:0.5px solid var(--bd);padding:0 14px;display:flex;align-items:center;gap:4px;height:36px;flex-shrink:0;overflow-x:auto}
.stats-bar>span{font-size:11px;color:var(--ink3);margin-right:4px;white-space:nowrap}
.spill{padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid transparent;white-space:nowrap;transition:.12s;background:none;font-family:'Inter',sans-serif;color:var(--ink2)}
.spill:hover{border-color:var(--bd2)}
.spill.act{background:var(--ink);color:#fff}
.s-recibido{color:#185FA5}.s-revision{color:#854F0B}.s-gestoria{color:#993C1D}
.s-dgt{color:#0F6E56}.s-cadeteria{color:#533AB7}.s-cerrado{color:#5F5E5A}
.snum{font-weight:600;margin-right:3px}

/* FILTERS */
.filters{padding:8px 14px;background:var(--surface);border-bottom:0.5px solid var(--bd);display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.filters input,.filters select{font-size:12px;padding:5px 10px;border:0.5px solid var(--bd2);border-radius:6px;background:var(--bg);color:var(--ink);outline:none;font-family:'Inter',sans-serif;transition:.12s}
.filters input:focus,.filters select:focus{border-color:var(--green)}
.filters input{flex:1;min-width:160px}
.limpiar{font-size:11px;color:var(--green);cursor:pointer;background:none;border:none;padding:0 4px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:3px;white-space:nowrap}

/* MAIN LAYOUT */
.main{flex:1;display:flex;overflow:hidden}
.tbl-col{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.tbl-scroll{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);padding:8px 14px;text-align:left;border-bottom:0.5px solid var(--bd);position:sticky;top:0;background:var(--surface);font-weight:500;z-index:1}
td{padding:10px 14px;border-bottom:0.5px solid var(--bd);vertical-align:middle}
tbody tr:hover td{background:#f0faf5;cursor:pointer}
tbody tr.sel td{background:#d8eee5}
.mat{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.3px}
.subtipo{font-size:10px;color:var(--ink3);letter-spacing:.2px}
.gest-name{color:var(--green);font-size:12px}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;display:inline-flex;align-items:center}
.b-recibido{background:#E6F1FB;color:#0C447C}
.b-revision{background:#FAEEDA;color:#633806}
.b-gestoria{background:#FAECE7;color:#712B13}
.b-dgt{background:#EAF3DE;color:#27500A}
.b-cadeteria{background:#EEEDFE;color:#3C3489}
.b-cerrado{background:#F1EFE8;color:#444441}
.docs-cell{font-size:11px;color:var(--ink3)}
.docs-cell b{color:var(--ink2);font-weight:500}
.falt{font-size:10px;color:var(--amber);display:flex;align-items:center;gap:3px;margin-top:2px}
.entry{font-size:11px;font-family:var(--mono);color:var(--ink3)}
.tri{color:var(--amber);font-size:13px;margin-right:3px}
#sin-resultados{text-align:center;padding:50px 20px;color:var(--ink3);font-size:13px;display:none;background:var(--surface)}

/* DETALLE PANEL */
.det-panel{width:360px;flex-shrink:0;border-left:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.det-header{padding:14px 14px 12px;border-bottom:0.5px solid var(--bd);flex-shrink:0}
.det-mat{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:.8px;color:var(--ink)}
.det-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.det-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.btn-close{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:16px;padding:2px;line-height:1}
.btn-close:hover{color:var(--ink)}
.det-body{flex:1;overflow-y:auto}
.det-section{padding:10px 14px;border-bottom:0.5px solid var(--bd)}
.det-section-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-bottom:8px;font-weight:500}
.doc-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.doc-row:last-child{border:none}
.doc-v{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;flex-shrink:0}
.dv-ok{background:var(--green-bg);color:var(--green)}
.dv-baja{background:var(--amber-bg);color:var(--amber)}
.dv-ev{background:#FAEEDA;color:#633806}
.dv-rech{background:var(--red-bg);color:var(--red)}
.doc-name{flex:1;font-family:var(--mono);font-size:11px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-ver{font-size:10px;color:var(--green);background:none;border:0.5px solid var(--green-bd);border-radius:4px;padding:2px 8px;cursor:pointer;flex-shrink:0;font-family:'Inter',sans-serif}
.btn-ver:hover{background:var(--green-bg)}
.hist-row{font-size:11px;color:var(--ink2);padding:7px 0;border-bottom:0.5px solid var(--bd);line-height:1.4;display:flex;gap:10px;align-items:flex-start}
.hist-row:last-child{border:none}
.hist-hora{font-family:var(--mono);font-size:10px;color:var(--ink3);flex-shrink:0;white-space:nowrap;margin-top:1px}
.hist-evt{flex:1;color:var(--ink2)}
.escalar-wrap{padding:10px 14px;border-top:0.5px solid var(--bd);flex-shrink:0}
.btn-escalar{width:100%;background:#A32D2D;color:#fff;border:none;border-radius:7px;padding:9px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-escalar:hover{background:#791F1F}
.btn-escalar:disabled{opacity:.6;cursor:not-allowed}

/* COTEJO/DOC PANEL */
.cotejo-panel{width:330px;flex-shrink:0;border-left:0.5px solid var(--bd);overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.cot-tabs{display:flex;gap:4px;padding:10px 14px;border-bottom:0.5px solid var(--bd);background:var(--surface);flex-shrink:0}
.cot-tab{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;border:0.5px solid transparent;background:none;color:var(--ink3);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;transition:.12s}
.cot-tab.act{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.cot-tab:hover:not(.act):not([disabled]){color:var(--ink2)}
.cot-tab[disabled]{opacity:.35;cursor:default}
.cotejo-body{padding:14px;flex:1}

/* COTEJO */
.veredicto{padding:10px 13px;border-radius:8px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.v-ok{background:var(--green-bg);border:0.5px solid var(--green-bd)}
.v-err{background:var(--amber-bg);border:0.5px solid var(--amber-bd)}
.veredicto i{font-size:18px;flex-shrink:0;margin-top:1px}
.v-ok i{color:var(--green)}.v-err i{color:var(--amber)}
.ver-title{font-size:13px;font-weight:600}
.v-ok .ver-title{color:var(--green)}.v-err .ver-title{color:var(--amber)}
.ver-sub{font-size:11px;opacity:.8;margin-top:2px;color:var(--ink2)}
.cot-sec{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin:14px 0 8px;font-weight:500}
.cc{background:var(--surface);border:0.5px solid var(--bd);border-radius:8px;padding:11px 12px;margin-bottom:8px;border-left:3px solid var(--green-bd)}
.cc-err{border-left-color:var(--red);background:var(--red-bg);border-color:var(--red-bd)}
.cc-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cc-head i{font-size:15px}
.ico-ok{color:var(--green)}.ico-err{color:var(--red)}
.cc-lbl{font-size:13px;font-weight:500}
.cc-lbl-err{color:var(--red)}
.cc-val{font-family:var(--mono);font-size:11px;background:var(--bg);padding:2px 8px;border-radius:4px;margin-left:auto;color:var(--ink2);word-break:break-all;flex-shrink:0}
.cc-pills{display:flex;flex-wrap:wrap;gap:5px}
.cc-pill{font-size:11px;color:var(--ink3);border:0.5px solid var(--bd);border-radius:20px;padding:2px 9px}
.cc-err-vals{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.cc-err-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cc-err-doc{font-size:11px;color:var(--red);border:0.5px solid var(--red-bd);border-radius:20px;padding:2px 9px;flex-shrink:0}
.cc-err-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--red)}

/* PANEL DOCUMENTO */
.pdf-view{display:flex;flex-direction:column;padding:14px;gap:12px}
.pdf-frame{background:var(--surface);border:0.5px solid var(--bd);border-radius:8px;height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink3);padding:20px;text-align:center;overflow:hidden}
.pdf-frame iframe{width:100%;height:100%;border:none;border-radius:8px}
.pdf-frame i{font-size:40px;margin-bottom:10px;opacity:.4}
.pdf-frame .fname{font-family:var(--mono);font-size:12px;color:var(--ink2);margin-bottom:4px}
.pdf-frame .fhint{font-size:11px}
.doc-fields-head{display:flex;align-items:center;gap:8px}
.doc-tipo-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--green-bg);color:var(--green);font-weight:600}
.doc-conf{font-size:11px;color:var(--ink3);margin-left:auto}
.field-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--bd);font-size:12px}
.field-row:last-child{border:none}
.field-ico{font-size:14px;flex-shrink:0}
.fi-ok{color:var(--green)}.fi-falta{color:var(--amber)}
.field-name{color:var(--ink3);min-width:105px}
.field-val{font-family:var(--mono);font-weight:600;color:var(--ink);margin-left:auto;word-break:break-all;text-align:right}
.field-val.falta{color:var(--amber);font-weight:400}
.doc-just{font-size:11px;color:var(--ink2);line-height:1.6;background:var(--bg);border-radius:6px;padding:9px 11px}

/* SECCIÓN HEADER */
.sec-header{padding:12px 16px;background:var(--surface);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sec-title{font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}

/* GESTORÍAS */
.gest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:14px;align-content:start;overflow-y:auto;flex:1}
.gest-card{background:var(--surface);border:0.5px solid var(--bd);border-radius:10px;padding:14px}
.gest-av{width:38px;height:38px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--green);flex-shrink:0}
.gest-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.gname{font-size:13px;font-weight:600;color:var(--ink)}
.gemail{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.gcontact{font-size:12px;color:var(--ink2);margin-bottom:8px}
.gest-actions{display:flex;gap:6px;margin-top:10px}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;border:0.5px solid var(--bd2);background:none;color:var(--ink2);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:4px;transition:.12s}
.btn-sm:hover{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.btn-sm-del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:12px;padding:22px;width:320px;border:0.5px solid var(--bd);box-shadow:0 20px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--ink)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--ink3);margin-bottom:4px;font-weight:500}
.form-row input{width:100%;font-size:12px;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:6px;background:var(--bg);color:var(--ink);outline:none;font-family:'Inter',sans-serif;transition:.12s}
.form-row input:focus{border-color:var(--green)}
.form-row input:disabled{opacity:.5;cursor:not-allowed}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* TOAST */
.toast{position:fixed;top:54px;right:16px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;z-index:300;opacity:0;transform:translateY(-6px);transition:.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.t-err{background:var(--red)}
.toast.t-ok{background:var(--green)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Tyrion <small>Colegio de Gestores · Pontevedra</small></div>
  <button class="nav-btn active" id="nb-operativo" onclick="setVista('operativo')"><i class="ti ti-layout-dashboard"></i> Operativo</button>
  <button class="nav-btn" id="nb-historico" onclick="setVista('historico')"><i class="ti ti-clock-history"></i> Histórico</button>
  <button class="nav-btn" id="nb-gestorias" onclick="setVista('gestorias')"><i class="ti ti-building-store"></i> Gestorías</button>
  <div class="topbar-right">
    <span class="chip-warn" id="chip-alertas" style="display:none"><i class="ti ti-alert-triangle"></i> <span id="num-alertas">0</span> alertas</span>
    <span class="sdot"></span>
    <span class="sys-info" id="sys-info">cargando…</span>
    <a href="/static/carga.html" class="btn-primary"><i class="ti ti-plus"></i> Cargar trámite</a>
  </div>
</div>

<!-- ═══ OPERATIVO ═══ -->
<div id="vista-operativo" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
  <div class="stats-bar" id="stats-bar">
    <span>Hoy:</span>
  </div>
  <div class="filters">
    <input id="q" type="text" placeholder="Matrícula, bastidor o gestoría…" oninput="renderTabla()">
    <select id="fTipo" onchange="cargarTramites()">
      <option value="">Todos los tipos</option>
      <option value="TRANSFERENCIA">Transferencia</option>
      <option value="MATRICULACION">Matriculación</option>
      <option value="BAJA">Baja</option>
    </select>
    <button class="limpiar" onclick="limpiar()"><i class="ti ti-x"></i> Limpiar</button>
  </div>
  <div class="main">
    <div class="tbl-col">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>Matrícula / ID</th>
              <th>Gestoría</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Entrada</th>
              <th>Docs</th>
            </tr>
          </thead>
          <tbody id="tbl"></tbody>
        </table>
        <div id="sin-resultados">Sin trámites para los filtros seleccionados.</div>
      </div>
    </div>
    <div class="det-panel" id="det-panel" style="display:none"></div>
    <div class="cotejo-panel" id="cotejo-panel" style="display:none"></div>
  </div>
</div>

<!-- ═══ HISTÓRICO ═══ -->
<div id="vista-historico" style="display:none;flex-direction:column;flex:1;overflow:hidden">
  <div class="sec-header">
    <span class="sec-title"><i class="ti ti-clock-history"></i> Histórico de trámites</span>
    <span style="font-size:11px;color:var(--ink3)" id="hist-count"></span>
  </div>
  <div class="filters">
    <input id="hq" type="text" placeholder="Matrícula, bastidor o gestoría…" oninput="renderHist()">
    <select id="hE" onchange="renderHist()">
      <option value="">Todos los estados</option>
      <option value="recibido">Recibido</option>
      <option value="en_revision">En revisión</option>
      <option value="pendiente_gestoria">Pendiente gestoría</option>
      <option value="listo_dgt">Listo DGT</option>
      <option value="en_cadeteria">En cadetería</option>
      <option value="cerrado">Cerrado</option>
    </select>
    <select id="hT" onchange="renderHist()">
      <option value="">Todos los tipos</option>
      <option value="TRANSFERENCIA">Transferencia</option>
      <option value="MATRICULACION">Matriculación</option>
      <option value="BAJA">Baja</option>
    </select>
  </div>
  <div class="tbl-scroll" style="flex:1">
    <table>
      <thead>
        <tr>
          <th>Matrícula / ID</th>
          <th>Gestoría</th>
          <th>Tipo · subtipo</th>
          <th>Estado</th>
          <th>Entrada</th>
          <th>Docs</th>
        </tr>
      </thead>
      <tbody id="htbl"></tbody>
    </table>
  </div>
</div>

<!-- ═══ GESTORÍAS ═══ -->
<div id="vista-gestorias" style="display:none;flex-direction:column;flex:1;overflow:hidden">
  <div class="sec-header">
    <span class="sec-title"><i class="ti ti-building-store"></i> Gestorías configuradas</span>
    <button class="btn-primary" onclick="abrirModal()"><i class="ti ti-plus"></i> Nueva gestoría</button>
  </div>
  <div class="filters">
    <input id="gq" type="text" placeholder="Buscar por nombre, email o contacto…" oninput="renderG()">
    <button class="limpiar" onclick="document.getElementById('gq').value='';renderG()"><i class="ti ti-x"></i> Limpiar</button>
  </div>
  <div class="gest-grid" id="gest-grid"></div>
</div>

<!-- MODAL GESTORÍA -->
<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <h3 id="modal-title">Nueva gestoría</h3>
    <div class="form-row"><label>Nombre *</label><input id="g-n" placeholder="Gestoria García"></div>
    <div class="form-row"><label>Email *</label><input id="g-e" placeholder="garcia@gestorias.es"></div>
    <div class="form-row"><label>Persona de contacto</label><input id="g-c" placeholder="Ana García"></div>
    <div class="form-row"><label>Teléfono</label><input id="g-t" placeholder="986 000 000"></div>
    <div class="form-row"><label>Chat ID Telegram</label><input id="g-tg" placeholder="123456789 (opcional)"></div>
    <div class="modal-btns">
      <button class="btn-sm" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardarGestoria()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════
let todosLosTramites = [];
let todasLasGestorias = [];
let selId = null;
let filtroEst = null;
let editEmail = null;

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
async function apiFetch(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  if (r.status === 204) return null;
  return r.json();
}

function formatHora(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit'});
}

function formatFechaCorta(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const dia = d.toLocaleDateString('es-ES', {day: '2-digit', month: 'short'});
  const hora = d.toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit'});
  return `${dia} · ${hora}`;
}

function minutosDesde(iso) {
  if (!iso) return 0;
  return Math.floor((Date.now() - new Date(iso)) / 60000);
}
function formatTiempo(m) {
  if (m < 60) return `${m}m`;
  const h = Math.floor(m/60), mm = m%60;
  if (h < 24) return mm > 0 ? `${h}h ${mm}m` : `${h}h`;
  const d = Math.floor(h/24), hh = h%24;
  return hh > 0 ? `${d}d ${hh}h` : `${d}d`;
}

function idLegible(t) {
  if (t.matricula || t.bastidor) return t.matricula || t.bastidor;
  const esUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(t.id);
  return esUuid ? (t.asunto_email ? t.asunto_email.slice(0,28)+'…' : 'Sin identificar') : t.id;
}

const BADGE = {
  recibido:           ['b-recibido','Recibido'],
  en_revision:        ['b-revision','En revisión'],
  pendiente_gestoria: ['b-gestoria','Pendiente gestoría'],
  listo_dgt:          ['b-dgt','Listo DGT'],
  en_cadeteria:       ['b-cadeteria','En cadetería'],
  cerrado:            ['b-cerrado','Cerrado'],
};
const badgeHtml = e => {
  const [c, l] = BADGE[e] || ['b-cerrado', e];
  return `<span class="badge ${c}">${l}</span>`;
};

function validezCls(v) {
  if (!v) return 'dv-baja';
  if (v === 'VALIDO') return 'dv-ok';
  if (v === 'EVIDENCIA_COMPATIBLE') return 'dv-ev';
  if (v === 'RECHAZADO') return 'dv-rech';
  return 'dv-baja';
}
function validezLabel(v) {
  if (v === 'VALIDO') return 'Válido';
  if (v === 'EVIDENCIA_COMPATIBLE') return 'Compatible';
  if (v === 'RECHAZADO') return 'Rechazado';
  return 'Baja conf.';
}

let _toastTimer = null;
function showToast(msg, tipo = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (tipo ? ' t-'+tipo : '');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ═══════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════
function setVista(v) {
  ['operativo','historico','gestorias'].forEach(x => {
    document.getElementById('vista-'+x).style.display = x === v ? 'flex' : 'none';
    document.getElementById('nb-'+x).classList.toggle('active', x === v);
  });
  if (v === 'historico') renderHist();
  if (v === 'gestorias') cargarGestorias();
}

// ═══════════════════════════════════════
// STATS BAR
// ═══════════════════════════════════════
async function cargarStats() {
  const stats = await apiFetch('/api/stats');
  const orden = ['recibido','en_revision','pendiente_gestoria','listo_dgt','en_cadeteria','cerrado'];
  const labels = stats.etiquetas || {};
  const conteos = stats.conteos || {};
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = '<span>Hoy:</span>' + orden.map(e => {
    const n = conteos[e] || 0;
    const lbl = labels[e] || e;
    const cls = {recibido:'s-recibido',en_revision:'s-revision',pendiente_gestoria:'s-gestoria',listo_dgt:'s-dgt',en_cadeteria:'s-cadeteria',cerrado:'s-cerrado'}[e] || '';
    const act = filtroEst === e ? ' act' : '';
    return `<button class="spill ${cls}${act}" onclick="filtrarE('${e}')"><span class="snum">${n}</span>${lbl}</button>`;
  }).join('');

  const alertas = stats.alertas || 0;
  const chip = document.getElementById('chip-alertas');
  chip.style.display = alertas > 0 ? 'flex' : 'none';
  document.getElementById('num-alertas').textContent = alertas;
}

async function cargarSalud() {
  try {
    const d = await apiFetch('/api/salud');
    const el = document.getElementById('sys-info');
    const nombre = d.clasificador === 'mock' ? 'mock' : `${d.clasificador} · ${d.modelo}`;
    el.textContent = `${nombre} · ${d.procesados_hoy} procesados`;
  } catch { /* silencioso */ }
}

// ═══════════════════════════════════════
// TABLA OPERATIVO
// ═══════════════════════════════════════
async function cargarTramites() {
  const params = new URLSearchParams();
  if (filtroEst) params.set('estado', filtroEst);
  const tipo = document.getElementById('fTipo').value;
  if (tipo) params.set('tipo', tipo);
  todosLosTramites = await apiFetch('/api/tramites?' + params);
  renderTabla();
}

function renderTabla() {
  const q = document.getElementById('q').value.toLowerCase();
  let base = todosLosTramites;
  if (q) base = base.filter(t =>
    (t.matricula||'').toLowerCase().includes(q) ||
    (t.bastidor||'').toLowerCase().includes(q) ||
    (t.gestoria||'').toLowerCase().includes(q));

  const sinRes = document.getElementById('sin-resultados');
  const tbody = document.getElementById('tbl');
  if (!base.length) { tbody.innerHTML=''; sinRes.style.display='block'; return; }
  sinRes.style.display = 'none';

  tbody.innerHTML = base.map(t => {
    const id = idLegible(t);
    const mins = minutosDesde(t.fecha_entrada);
    const hora = formatHora(t.fecha_entrada);
    const tipoSub = t.subtipo && t.subtipo !== 'ninguno'
      ? `<div class="subtipo">${t.tipo} · ${t.subtipo}</div>`
      : `<div class="subtipo">${t.tipo}</div>`;
    const faltantes = [...(t.documentos_faltantes||[]), ...(t.avisos_pendientes||[]).map(a=>a.requisito).filter(Boolean)];
    const faltHtml = faltantes.length
      ? `<div class="falt"><i class="ti ti-alert-triangle"></i>falta ${faltantes.slice(0,2).join(', ')}${faltantes.length>2?' +'+( faltantes.length-2):''}</div>` : '';
    return `<tr onclick="sel('${t.id}')" class="${selId===t.id?'sel':''}">
      <td><span class="mat">${t.alerta?'<i class="ti ti-alert-triangle tri"></i>':''}${id}</span>${tipoSub}</td>
      <td class="gest-name">${t.gestoria}</td>
      <td style="font-size:11px;color:var(--ink2)">${t.tipo}</td>
      <td>${badgeHtml(t.estado)}</td>
      <td class="entry">${hora}<br><span style="color:var(--ink3)">${formatTiempo(mins)}</span></td>
      <td class="docs-cell"><b>${t.num_docs}</b> docs${faltHtml}</td>
    </tr>`;
  }).join('');
}

function filtrarE(e) {
  filtroEst = filtroEst === e ? null : e;
  recargar();
}
function limpiar() {
  filtroEst = null;
  document.getElementById('q').value = '';
  document.getElementById('fTipo').value = '';
  recargar();
}

// ═══════════════════════════════════════
// DETALLE
// ═══════════════════════════════════════
async function sel(id) {
  if (selId === id) { cerrarDet(); return; }
  selId = id;
  renderTabla();

  const t = await apiFetch(`/api/tramites/${id}`);
  const dp = document.getElementById('det-panel');
  dp.style.display = 'flex';
  dp.style.flexDirection = 'column';

  const idLabel = t.matricula || t.bastidor ||
    (/^[0-9a-f]{8}-[0-9a-f]{4}/i.test(id) ? (t.asunto_email || 'Sin identificar') : id);

  const tipoMeta = t.subtipo && t.subtipo !== 'ninguno'
    ? `${t.tipo} · ${t.subtipo}` : t.tipo;

  const docsHtml = (t.documentos || []).map((d, di) => {
    const cls = validezCls(d.validez || d.v);
    const lbl = validezLabel(d.validez || d.v);
    return `<div class="doc-row">
      <span class="doc-v ${cls}">${lbl}</span>
      <span class="doc-name" title="${d.nombre}">${d.nombre}</span>
      ${d.id ? `<button class="btn-ver" onclick="verDoc('${id}',${di},'${d.id}')">Ver</button>` : ''}
    </div>`;
  }).join('');

  const histHtml = [...(t.historial || [])].reverse().map(h => {
    const hora = h.momento ? formatFechaCorta(h.momento) : '';
    return `<div class="hist-row">
      ${hora ? `<span class="hist-hora">${hora}</span>` : ''}
      <span class="hist-evt">${h.evento}</span>
    </div>`;
  }).join('');

  dp.innerHTML = `
    <div class="det-header">
      <div class="det-header-row">
        <div>
          <div class="det-mat">${idLabel}</div>
          <div class="det-meta">${tipoMeta} · ${t.gestoria}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${badgeHtml(t.estado)}
          <button class="btn-close" onclick="cerrarDet()"><i class="ti ti-x"></i></button>
        </div>
      </div>
    </div>
    <div class="det-body">
      <div class="det-section">
        <div class="det-section-lbl">Documentos (${(t.documentos||[]).length})</div>
        ${docsHtml || '<div style="color:var(--ink3);font-size:12px">Sin documentos.</div>'}
      </div>
      ${(t.avisos_pendientes||[]).length ? `
        <div class="det-section">
          <div class="det-section-lbl">Avisos pendientes</div>
          ${t.avisos_pendientes.map(a=>`<div class="hist-row">
            <span class="hist-hora" style="color:var(--amber)">${formatFechaCorta(a.enviado_at||a.preparado_at)}</span>
            <span class="hist-evt">${a.tipo||'AVISO'} · ${a.requisito||a.asunto||''}</span>
          </div>`).join('')}
        </div>` : ''}
      <div class="det-section" style="border:none">
        <div class="det-section-lbl">Historial</div>
        ${histHtml}
      </div>
    </div>
    ${t.estado === 'pendiente_gestoria' ? `
      <div class="escalar-wrap">
        <button class="btn-escalar" id="btn-escalar" onclick="escalar('${id}')">
          <i class="ti ti-alert-triangle"></i> Escalar al administrativo
        </button>
      </div>` : ''}
  `;

  window._tActual = t;
  renderPanel('cotejo');
}

function cerrarDet() {
  selId = null;
  document.getElementById('det-panel').style.display = 'none';
  document.getElementById('cotejo-panel').style.display = 'none';
  renderTabla();
}

// ═══════════════════════════════════════
// PANEL DERECHO (COTEJO / DOCUMENTO)
// ═══════════════════════════════════════
function renderPanel(modo, docIdx, docId) {
  const t = window._tActual; if (!t) return;
  const cp = document.getElementById('cotejo-panel');
  cp.style.display = 'flex';
  cp.style.flexDirection = 'column';

  const tieneCotejo = t.verificaciones && t.verificaciones.length > 0;
  const tabs = `<div class="cot-tabs">
    <button class="cot-tab ${modo==='cotejo'?'act':''}" onclick="renderPanel('cotejo')" ${tieneCotejo?'':'disabled'}>
      <i class="ti ti-checklist"></i> Cotejo
    </button>
    <button class="cot-tab ${modo==='doc'?'act':''}" onclick="renderPanel('doc',${docIdx||0},'${docId||''}')">
      <i class="ti ti-file-text"></i> Documento
    </button>
  </div>`;

  if (modo === 'cotejo') {
    if (!tieneCotejo) {
      cp.innerHTML = tabs + `<div class="cotejo-body" style="color:var(--ink3);font-size:12px;text-align:center;padding-top:30px">
        Sin cotejo cruzado disponible.<br>Abrí un documento para ver su extracción.
      </div>`;
      return;
    }
    const verifs = t.verificaciones;
    const allOk = verifs.every(v => v.ok);
    const errCount = verifs.filter(v => !v.ok).length;

    cp.innerHTML = tabs + `<div class="cotejo-body">
      <div class="veredicto ${allOk?'v-ok':'v-err'}">
        <i class="ti ${allOk?'ti-shield-check':'ti-alert-triangle'}"></i>
        <div>
          <div class="ver-title">${allOk ? 'Expediente verificado' : 'Discrepancias detectadas'}</div>
          <div class="ver-sub">${allOk
            ? `${verifs.length} verificaciones cruzadas. Sin intervención requerida.`
            : `${errCount} discrepanc${errCount===1?'ia':'ias'} encontrada${errCount===1?'':'s'}. Revisar los campos en rojo.`}</div>
        </div>
      </div>
      <div class="cot-sec">Verificaciones cruzadas</div>
      ${verifs.map(v => {
        if (v.presente) {
          return `<div class="cc">
            <div class="cc-head">
              <i class="ti ti-circle-check ico-ok"></i>
              <span class="cc-lbl">${v.campo} presente</span>
              ${v.val ? `<span class="cc-val">${v.val}</span>` : ''}
            </div>
            <div style="font-size:11px;color:var(--ink3)">${v.descripcion||('Localizado en '+v.doc+'.')}</div>
          </div>`;
        }
        if (v.ok) {
          const docs = v.docs || [];
          return `<div class="cc">
            <div class="cc-head">
              <i class="ti ti-circle-check ico-ok"></i>
              <span class="cc-lbl">${v.campo}${v.val?' coincide':''}</span>
              ${v.val ? `<span class="cc-val">${v.val}</span>` : ''}
            </div>
            ${docs.length ? `<div class="cc-pills">${docs.map(d=>`<span class="cc-pill">${d}</span>`).join('')}</div>` : ''}
            ${v.descripcion ? `<div style="font-size:11px;color:var(--ink3);margin-top:4px">${v.descripcion}</div>` : ''}
          </div>`;
        }
        return `<div class="cc cc-err">
          <div class="cc-head">
            <i class="ti ti-circle-x ico-err"></i>
            <span class="cc-lbl cc-lbl-err">${v.campo} NO coincide</span>
          </div>
          ${v.vals ? `<div class="cc-err-vals">${v.vals.map(ev=>`
            <div class="cc-err-row">
              <span class="cc-err-doc">${ev.doc}</span>
              <span class="cc-err-val">${ev.val}</span>
            </div>`).join('')}</div>` : ''}
          ${v.descripcion ? `<div style="font-size:11px;margin-top:4px">${v.descripcion}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  } else {
    // Modo documento — mostrar placeholder hasta que cargue
    const d = (t.documentos || [])[docIdx || 0];
    if (!d) { renderPanel('cotejo'); return; }
    cp.innerHTML = tabs + `<div class="pdf-view">
      <div class="pdf-frame" id="pdf-frame">
        <i class="ti ti-file-text"></i>
        <div class="fname">${d.nombre}</div>
        <div class="fhint">Cargando…</div>
      </div>
      <div id="doc-fields-content"></div>
    </div>`;

    // Cargar extracción real del endpoint
    if (d.id) {
      cargarExtraccion(d.id, d.nombre, docIdx);
    }
  }
}

async function cargarExtraccion(docId, nombre, docIdx) {
  try {
    const ext = await apiFetch(`/api/documentos/${docId}/extraccion`);
    const frame = document.getElementById('pdf-frame');
    if (!frame) return;

    if (ext.tiene_archivo) {
      frame.innerHTML = `<iframe src="/api/documentos/${docId}/archivo" style="width:100%;height:100%;border:none;border-radius:8px"></iframe>`;
    } else {
      frame.innerHTML = `
        <i class="ti ti-file-text"></i>
        <div class="fname">${nombre}</div>
        <div class="fhint">Vista previa no disponible en modo de prueba.<br>En producción se muestra el PDF original.</div>`;
    }

    const campos = ext.campos_extraidos || [];
    const confPct = ext.confianza_score ? `${(ext.confianza_score*100).toFixed(0)}%` : ext.confianza || '';
    const camposHtml = campos.map(c => {
      const ok = c.estado === 'valido';
      const falta = c.estado === 'rechazado' || c.estado === 'ilegible' || !c.valor || c.valor === '—';
      return `<div class="field-row">
        <i class="ti ${ok?'ti-check fi-ok':'ti-alert-triangle fi-falta'} field-ico"></i>
        <span class="field-name">${c.campo}</span>
        <span class="field-val ${falta?'falta':''}">${c.valor||'—'}</span>
      </div>`;
    }).join('');

    const cont = document.getElementById('doc-fields-content');
    if (!cont) return;
    cont.innerHTML = `
      <div class="doc-fields-head">
        <span class="doc-tipo-badge">${ext.tipo_detectado||'Documento'}</span>
        <span class="doc-conf">${ext.confianza||''} ${confPct}</span>
      </div>
      ${camposHtml}
      ${ext.justificacion ? `<div class="doc-just">${ext.justificacion}</div>` : ''}`;
  } catch(e) {
    const frame = document.getElementById('pdf-frame');
    if (frame) frame.innerHTML = `<div style="color:var(--red);font-size:12px">Error: ${e.message}</div>`;
  }
}

function verDoc(tramiteId, di, docId) {
  if (!window._tActual || window._tActual.id !== tramiteId) {
    sel(tramiteId).then(() => renderPanel('doc', di, docId));
  } else {
    renderPanel('doc', di, docId);
  }
}

// ═══════════════════════════════════════
// ESCALAR
// ═══════════════════════════════════════
async function escalar(id) {
  const btn = document.getElementById('btn-escalar');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> Escalando…'; }
  try {
    const data = await apiFetch(`/api/tramites/${id}/escalar`, {method: 'POST'});
    if (data && data.ok) {
      showToast('Trámite escalado al administrativo.', 'ok');
      await recargar();
      await sel(id);
    } else {
      showToast('No se pudo escalar.', 'err');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-alert-triangle"></i> Escalar al administrativo'; }
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-alert-triangle"></i> Escalar al administrativo'; }
  }
}

// ═══════════════════════════════════════
// HISTÓRICO
// ═══════════════════════════════════════
function renderHist() {
  const q = document.getElementById('hq').value.toLowerCase();
  const fe = document.getElementById('hE').value;
  const ft = document.getElementById('hT').value;
  const filtrados = todosLosTramites.filter(t => {
    if (fe && t.estado !== fe) return false;
    if (ft && t.tipo !== ft) return false;
    if (q && !((t.matricula||'').toLowerCase().includes(q) ||
               (t.bastidor||'').toLowerCase().includes(q) ||
               (t.gestoria||'').toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById('hist-count').textContent = `${filtrados.length} trámites`;
  document.getElementById('htbl').innerHTML = filtrados.map(t => {
    const id = idLegible(t);
    const tipoSub = t.subtipo && t.subtipo !== 'ninguno' ? `${t.tipo} · <em>${t.subtipo}</em>` : t.tipo;
    return `<tr onclick="setVista('operativo');setTimeout(()=>sel('${t.id}'),60)" style="cursor:pointer">
      <td><span class="mat">${id}</span></td>
      <td class="gest-name">${t.gestoria}</td>
      <td style="font-size:11px;color:var(--ink2)">${tipoSub}</td>
      <td>${badgeHtml(t.estado)}</td>
      <td class="entry">${formatFechaCorta(t.fecha_entrada)}</td>
      <td class="docs-cell"><b>${t.num_docs}</b></td>
    </tr>`;
  }).join('');
}

// ═══════════════════════════════════════
// GESTORÍAS
// ═══════════════════════════════════════
async function cargarGestorias() {
  todasLasGestorias = await apiFetch('/api/gestorias');
  renderG();
}

function renderG() {
  const q = (document.getElementById('gq').value || '').toLowerCase();
  const filtradas = todasLasGestorias.filter(g =>
    !q ||
    (g.nombre||'').toLowerCase().includes(q) ||
    (g.email||'').toLowerCase().includes(q) ||
    (g.contacto||'').toLowerCase().includes(q));
  const grid = document.getElementById('gest-grid');
  if (!filtradas.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--ink3);padding:30px;font-size:13px">Sin resultados</div>';
    return;
  }
  grid.innerHTML = filtradas.map(g => {
    const inicial = (g.nombre || g.email || '?')[0].toUpperCase();
    const contactoTel = [g.contacto, g.telefono].filter(Boolean).join(' · ');
    return `<div class="gest-card">
      <div class="gest-head">
        <div class="gest-av">${inicial}</div>
        <div><div class="gname">${g.nombre}</div><div class="gemail">${g.email}</div></div>
      </div>
      ${contactoTel ? `<div class="gcontact">${contactoTel}</div>` : ''}
      <div class="gest-actions">
        <button class="btn-sm" onclick="editG('${g.email}')"><i class="ti ti-edit"></i> Editar</button>
        <button class="btn-sm btn-sm-del" onclick="delG('${g.email}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function abrirModal() {
  editEmail = null;
  document.getElementById('modal-title').textContent = 'Nueva gestoría';
  ['g-n','g-c','g-t'].forEach(id => document.getElementById(id).value = '');
  const emailInput = document.getElementById('g-e');
  emailInput.value = ''; emailInput.disabled = false;
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('g-n').focus();
}

function editG(email) {
  const g = todasLasGestorias.find(x => x.email === email);
  if (!g) return;
  editEmail = email;
  document.getElementById('modal-title').textContent = 'Editar gestoría';
  document.getElementById('g-n').value = g.nombre || '';
  const emailInput = document.getElementById('g-e');
  emailInput.value = g.email; emailInput.disabled = true;
  document.getElementById('g-c').value = g.contacto || '';
  document.getElementById('g-t').value = g.telefono || '';
  document.getElementById('g-tg').value = g.telegram_chat_id || '';
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('g-n').focus();
}

function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

async function guardarGestoria() {
  const n = document.getElementById('g-n').value.trim();
  const e = document.getElementById('g-e').value.trim();
  const c = document.getElementById('g-c').value.trim();
  const t = document.getElementById('g-t').value.trim();
  const tg = document.getElementById('g-tg').value.trim();
  if (!n) { showToast('El nombre es obligatorio.', 'err'); return; }
  if (!editEmail && !e) { showToast('El email es obligatorio.', 'err'); return; }
  try {
    if (editEmail) {
      await apiFetch(`/api/gestorias/${editEmail}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({nombre:n, contacto:c, telefono:t, telegram_chat_id:tg}),
      });
      showToast('Gestoría actualizada.', 'ok');
    } else {
      await apiFetch('/api/gestorias', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email:e, nombre:n, contacto:c, telefono:t, telegram_chat_id:tg}),
      });
      showToast('Gestoría creada.', 'ok');
    }
    cerrarModal();
    await cargarGestorias();
  } catch(err) {
    showToast('Error: ' + err.message, 'err');
  }
}

async function delG(email) {
  const g = todasLasGestorias.find(x => x.email === email);
  if (!confirm(`¿Eliminar "${g?.nombre || email}"?`)) return;
  try {
    await apiFetch(`/api/gestorias/${email}`, {method: 'DELETE'});
    showToast('Gestoría eliminada.', 'ok');
    await cargarGestorias();
  } catch(err) {
    showToast('Error: ' + err.message, 'err');
  }
}

// ═══════════════════════════════════════
// POLLING
// ═══════════════════════════════════════
async function recargar() {
  await Promise.all([cargarStats(), cargarTramites(), cargarSalud()]);
}

recargar();
setInterval(recargar, 30_000);
</script>
