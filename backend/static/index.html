<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyrion — Pantalla Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0F1B2D;
    --blue:       #1E3A5F;
    --blue-light: #EBF2FB;
    --bg:         #F4F6F9;
    --white:      #FFFFFF;
    --alert:      #E8531A;
    --alert-bg:   #FEF0EA;
    --success:    #1A7A4A;
    --success-bg: #E8F5EE;
    --warn:       #B45309;
    --warn-bg:    #FEF3C7;
    --danger:     #B91C1C;
    --danger-bg:  #FEE2E2;
    --text:       #111827;
    --text-2:     #4B5563;
    --text-3:     #9CA3AF;
    --border:     #E5E7EB;
    --border-2:   #D1D5DB;
    --radius-sm:  4px;
    --radius:     8px;
    --radius-lg:  12px;
    --shadow:     0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md:  0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: #fff;
    height: 56px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
    user-select: none;
  }
  .header-brand {
    display: flex;
    flex-direction: column;
    margin-right: 24px;
    flex-shrink: 0;
  }
  .header-brand h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .3px;
    line-height: 1.1;
    color: #fff;
  }
  .header-brand .sub {
    font-size: 10px;
    color: #94a3b8;
    letter-spacing: .2px;
    margin-top: 1px;
  }

  /* Barra de estados (reemplaza los cards) */
  #cards {
    display: flex;
    align-items: stretch;
    flex: 1;
    height: 100%;
    gap: 0;
    overflow: hidden;
  }
  .card {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 16px;
    cursor: pointer;
    position: relative;
    border-bottom: 3px solid transparent;
    transition: background .15s, border-color .15s;
    min-width: 90px;
    gap: 1px;
  }
  .card::after {
    content: '›';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    color: #2d4a6b;
    font-size: 18px;
    z-index: 1;
    pointer-events: none;
  }
  .card:last-child::after { display: none; }
  .card:hover { background: rgba(255,255,255,.07); }
  .card.activo {
    background: rgba(255,255,255,.1);
    border-bottom-color: #fff;
  }
  .card .num {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
  }
  .card.con-alerta .num { color: var(--alert); }
  .card .label {
    font-size: 10px;
    color: #94a3b8;
    letter-spacing: .3px;
    white-space: nowrap;
  }
  .card.activo .label { color: #cbd5e1; }

  /* Badge alertas en header */
  #badge-alertas {
    flex-shrink: 0;
    margin-left: 12px;
    background: var(--alert);
    color: #fff;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 600;
    display: none;
    cursor: pointer;
    transition: opacity .15s;
    white-space: nowrap;
    align-items: center;
    gap: 4px;
  }
  #badge-alertas:hover { opacity: .85; }
  #badge-alertas.activo { outline: 2px solid rgba(255,255,255,.4); }

  /* ── LAYOUT PRINCIPAL ── */
  #main {
    display: flex;
    flex: 1;
    min-height: 0;
    gap: 0;
  }

  /* ── PANEL TABLA ── */
  #panel-tabla {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
    overflow: hidden;
  }

  #barra-filtros {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
    background: var(--white);
    flex-shrink: 0;
  }
  #barra-filtros input, #barra-filtros select {
    border: 1px solid var(--border-2);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    color: var(--text);
    background: var(--white);
    transition: border-color .15s;
  }
  #barra-filtros input:focus, #barra-filtros select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(30,58,95,.1);
  }
  #barra-filtros input { width: 220px; }
  #btn-limpiar {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-3);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 4px 6px;
    border-radius: var(--radius-sm);
    transition: color .15s;
  }
  #btn-limpiar:hover { color: var(--text); }

  .tabla-wrapper {
    flex: 1;
    overflow-y: auto;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 9px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-3);
    background: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    background: var(--white);
    transition: background .1s;
  }
  tbody tr:hover { background: var(--blue-light); }
  tbody tr.seleccionada {
    background: var(--blue-light);
    border-left: 3px solid var(--blue);
  }
  tbody td {
    padding: 10px 14px;
    vertical-align: middle;
    font-size: 13px;
    color: var(--text-2);
  }
  tbody td:nth-child(2) { color: var(--text); font-weight: 600; }
  tbody td:nth-child(7) { color: var(--text-3); font-size: 12px; }

  .badge-estado {
    display: inline-block;
    border-radius: 10px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-recibido           { background: var(--blue-light); color: var(--blue); }
  .badge-en_revision        { background: var(--warn-bg);    color: var(--warn); }
  .badge-pendiente_gestoria { background: var(--alert-bg);   color: var(--alert); }
  .badge-listo_dgt          { background: var(--success-bg); color: var(--success); }
  .badge-en_cadeteria       { background: #EDE9FE;           color: #6D28D9; }
  .badge-cerrado            { background: #F3F4F6;           color: var(--text-3); }

  .alerta-icon { color: var(--alert); font-size: 14px; }

  .tiempo-entrada {
    color: var(--text-3);
    font-size: 11px;
    margin-left: 4px;
  }

  #sin-resultados {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-3);
    display: none;
    font-size: 13px;
  }
  #sin-resultados::before {
    content: '📋';
    display: block;
    font-size: 28px;
    margin-bottom: 8px;
  }

  /* ── PANEL LATERAL (detalle trámite) ── */
  #panel-detalle {
    width: 380px;
    background: var(--white);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: none;
    flex-direction: column;
    flex-shrink: 0;
  }
  #panel-detalle.visible { display: flex; }

  #detalle-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #detalle-header h2 {
    font-size: 15px;
    font-weight: 600;
    padding-right: 28px;
    color: var(--text);
    line-height: 1.3;
  }
  #detalle-header .meta {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 3px;
  }
  #btn-cerrar-detalle {
    float: right;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-3);
    margin-top: -2px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: var(--radius-sm);
    transition: color .1s, background .1s;
  }
  #btn-cerrar-detalle:hover { color: var(--text); background: var(--bg); }

  #detalle-cuerpo {
    padding: 14px 16px;
    flex: 1;
  }

  .seccion-titulo {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--text-3);
    margin: 16px 0 7px;
  }
  .seccion-titulo:first-child { margin-top: 0; }

  .doc-item {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .doc-item:last-child { border-bottom: none; }
  .doc-validez {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 8px;
    flex-shrink: 0;
    letter-spacing: .2px;
  }
  .doc-VALIDO               { background: var(--success-bg); color: var(--success); }
  .doc-EVIDENCIA_COMPATIBLE { background: var(--warn-bg);    color: var(--warn); }
  .doc-RECHAZADO            { background: var(--danger-bg);  color: var(--danger); }
  .doc-nombre {
    flex: 1;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .doc-link {
    font-size: 11px;
    color: var(--blue);
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--blue-light);
    font-weight: 500;
    transition: background .1s, border-color .1s;
  }
  .doc-link:hover { background: var(--blue-light); border-color: var(--blue); }

  .evento-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .evento-item:last-child { border-bottom: none; }
  .evento-item > div:first-child { font-size: 13px; color: var(--text); }
  .evento-hora {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
  }

  .aviso-item {
    background: var(--alert-bg);
    border-left: 3px solid var(--alert);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .aviso-tipo {
    font-weight: 700;
    color: var(--alert);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .3px;
  }

  #btn-escalar {
    display: none;
    width: calc(100% - 32px);
    margin: 0 16px 16px;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s;
    flex-shrink: 0;
  }
  #btn-escalar:hover { background: #991b1b; }
  #btn-escalar:disabled { background: var(--text-3); cursor: not-allowed; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    min-width: 240px;
    max-width: 360px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    box-shadow: var(--shadow-md);
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.toast-ok   { background: var(--success); }
  #toast.toast-err  { background: var(--danger); }
  #toast.toast-warn { background: var(--warn); }

  /* ── DOCS FALTANTES en tabla ── */
  .docs-faltantes { color: var(--warn); font-size: 11px; }

  /* ── SPLIT-VIEW DOCUMENTAL ── */
  #panel-split {
    display: none;
    flex-direction: column;
    background: var(--white);
    border-left: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  #panel-split.visible { display: flex; width: 560px; }

  #split-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #split-header h3 {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #btn-cerrar-split {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-3);
    padding: 2px 4px;
    border-radius: var(--radius-sm);
    transition: color .1s, background .1s;
    line-height: 1;
  }
  #btn-cerrar-split:hover { color: var(--text); background: var(--bg); }

  #split-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #split-izq {
    flex: 1;
    background: #F8F9FA;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-3);
    padding: 20px;
    text-align: center;
  }
  #split-der {
    width: 280px;
    overflow-y: auto;
    padding: 14px;
    flex-shrink: 0;
  }

  .campo-item {
    display: flex;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .campo-item:last-child { border-bottom: none; }
  .campo-estado { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .campo-nombre {
    font-size: 11px;
    color: var(--text-3);
    flex-shrink: 0;
    width: 110px;
    padding-top: 1px;
  }
  .campo-valor { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }

  #split-justificacion {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.6;
  }

  .validez-banner {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .banner-VALIDO               { background: var(--success-bg); color: var(--success); }
  .banner-EVIDENCIA_COMPATIBLE { background: var(--warn-bg);    color: var(--warn); }
  .banner-RECHAZADO            { background: var(--danger-bg);  color: var(--danger); }

  /* ── FOOTER ── */
  #footer {
    text-align: right;
    padding: 3px 16px;
    font-size: 11px;
    color: var(--text-3);
    background: var(--white);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="header-brand">
    <h1>Tyrion</h1>
    <span class="sub">Colegio de Gestores · Pontevedra</span>
  </div>

  <!-- Barra de estados (sustituye los cards flotantes) -->
  <div id="cards"></div>

  <div style="display:flex;align-items:center;gap:12px;margin-left:auto;padding-right:16px">
    <div id="badge-alertas" onclick="filtroAlertas()" style="cursor:pointer">⚠ <span id="num-alertas">0</span> alertas</div>
    <div id="indicador-salud" style="font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap">● cargando…</div>
    <a href="/static/carga.html" style="background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap">+ Cargar trámite</a>
  </div>
</header>

<div id="main">
  <!-- Tabla principal -->
  <div id="panel-tabla">
    <div id="barra-filtros">
      <input id="filtro-texto" type="text" placeholder="Buscar matrícula, bastidor o gestoría…">
      <select id="filtro-tipo">
        <option value="">Todos los tipos</option>
        <option value="TRANSFERENCIA">Transferencia</option>
        <option value="MATRICULACION">Matriculación</option>
        <option value="BAJA">Baja</option>
      </select>
      <button id="btn-limpiar" onclick="limpiarFiltros()">✕ Limpiar</button>
    </div>
    <div class="tabla-wrapper">
      <table>
        <thead>
          <tr>
            <th style="width:28px"></th>
            <th>Matrícula / Bastidor</th>
            <th>Gestoría</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Entrada</th>
            <th>Docs</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="sin-resultados">Sin trámites para los filtros seleccionados.</div>
    </div>
  </div>

  <!-- Panel lateral: detalle del trámite -->
  <div id="panel-detalle">
    <div id="detalle-header">
      <button id="btn-cerrar-detalle" onclick="cerrarDetalle()">×</button>
      <h2 id="detalle-titulo">—</h2>
      <div class="meta" id="detalle-meta"></div>
    </div>
    <div id="detalle-cuerpo"></div>
    <button id="btn-escalar" onclick="escalar()">⚠ Escalar al administrativo</button>
  </div>

  <!-- Split-view: visor de documento -->
  <div id="panel-split">
    <div id="split-header">
      <h3 id="split-titulo">—</h3>
      <button id="btn-cerrar-split" onclick="cerrarSplit()">×</button>
    </div>
    <div id="split-body">
      <div id="split-izq">
        <div id="split-archivo-msg">📄 Selecciona un documento<br>para ver su contenido.</div>
      </div>
      <div id="split-der">
        <div id="split-campos"></div>
      </div>
    </div>
  </div>
</div>

<div id="footer">Actualización cada 30 s · <span id="ultima-actualizacion">—</span></div>

<script>
// ── Estado ──
let estadoActivo = null;
let tramiteSeleccionado = null;
let todosLosTramites = [];

// ── API ──
async function apiFetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ── Helpers ──
function formatHora(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
}
function minutosDesde(iso) {
  if (!iso) return 0;
  const d = new Date(iso);
  return isNaN(d) ? 0 : Math.floor((Date.now() - d) / 60000);
}
function formatTiempo(mins) {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h < 24) return m > 0 ? `${h}h ${m}m` : `${h}h`;
  const d = Math.floor(h / 24);
  const hRest = h % 24;
  return hRest > 0 ? `${d}d ${hRest}h` : `${d}d`;
}

// ── Cards (barra de estados en header) ──
async function cargarStats() {
  const stats = await apiFetch('/api/stats');
  const orden = ['recibido','en_revision','pendiente_gestoria','listo_dgt','en_cadeteria','cerrado'];
  document.getElementById('cards').innerHTML = orden.map(e => {
    const n = stats.conteos[e] || 0;
    const label = stats.etiquetas[e] || e;
    const alerta = e === 'pendiente_gestoria' && n > 0 ? ' con-alerta' : '';
    const activo = estadoActivo === e ? ' activo' : '';
    return `<div class="card${alerta}${activo}" onclick="filtrarPorCard('${e}')">
      <div class="num">${n}</div><div class="label">${label}</div>
    </div>`;
  }).join('');
  const badge = document.getElementById('badge-alertas');
  badge.style.display = stats.alertas > 0 ? 'block' : 'none';
  document.getElementById('num-alertas').textContent = stats.alertas;
}

// ── Tabla ──
async function cargarTramites() {
  const params = new URLSearchParams();
  if (estadoActivo) params.set('estado', estadoActivo);
  const tipo = document.getElementById('filtro-tipo').value;
  if (tipo) params.set('tipo', tipo);
  todosLosTramites = await apiFetch('/api/tramites?' + params);
  renderTabla();
}
function renderTabla() {
  const texto = document.getElementById('filtro-texto').value.toLowerCase();
  let base = filtroAlertaActivo ? todosLosTramites.filter(t => t.alerta) : todosLosTramites;
  const filtrados = texto
    ? base.filter(t =>
        (t.matricula||'').toLowerCase().includes(texto) ||
        (t.bastidor||'').toLowerCase().includes(texto) ||
        t.gestoria.toLowerCase().includes(texto))
    : base;

  const sinRes = document.getElementById('sin-resultados');
  const tbody  = document.getElementById('tbody');
  if (!filtrados.length) { tbody.innerHTML = ''; sinRes.style.display = 'block'; return; }
  sinRes.style.display = 'none';

  tbody.innerHTML = filtrados.map(t => {
    const alertaIcon = t.alerta ? '<span class="alerta-icon" title="Requiere atención">⚠</span>' : '';
    // Si no hay matrícula ni bastidor y el id parece UUID (36 chars con guiones), mostrar asunto/abreviado
    let id = t.matricula || t.bastidor;
    if (!id) {
      const esUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(t.id);
      id = esUuid ? (t.asunto_email ? t.asunto_email.slice(0,30) : 'Sin identificar') + ' …' + t.id.slice(0,8) : t.id;
    }
    const mins  = minutosDesde(t.fecha_entrada);
    const hora  = formatHora(t.fecha_entrada);
    const sel   = tramiteSeleccionado === t.id ? ' class="seleccionada"' : '';
    // Indicador faltantes en columna Docs
    const faltantes = t.documentos_faltantes || [];
    const pendientes = (t.avisos_pendientes || []).map(a => a.requisito);
    const todosFaltantes = [...new Set([...faltantes, ...pendientes])];
    const docExtra = todosFaltantes.length
      ? ` <span class="docs-faltantes" title="Falta: ${todosFaltantes.join(', ')}">· ⚠ falta ${todosFaltantes[0]}${todosFaltantes.length > 1 ? ' +' + (todosFaltantes.length-1) : ''}</span>`
      : '';
    return `<tr${sel} onclick="abrirDetalle('${t.id}')">
      <td>${alertaIcon}</td>
      <td><strong>${id}</strong></td>
      <td>${t.gestoria}</td>
      <td>${t.tipo}</td>
      <td><span class="badge-estado badge-${t.estado}" title="${t.estado_label}">${t.estado_label}</span></td>
      <td>${hora} <span class="tiempo-entrada">${formatTiempo(mins)}</span></td>
      <td>${t.num_docs} docs${docExtra}</td>
    </tr>`;
  }).join('');
}

// ── Filtros ──
function filtrarPorCard(estado) {
  estadoActivo = estadoActivo === estado ? null : estado;
  filtroAlertaActivo = false;
  cargarStats(); cargarTramites();
}
let filtroAlertaActivo = false;
function filtroAlertas() {
  filtroAlertaActivo = !filtroAlertaActivo;
  estadoActivo = null;
  document.getElementById('badge-alertas').classList.toggle('activo', filtroAlertaActivo);
  cargarStats(); cargarTramites();
}
function limpiarFiltros() {
  estadoActivo = null;
  filtroAlertaActivo = false;
  document.getElementById('badge-alertas').classList.remove('activo');
  document.getElementById('filtro-texto').value = '';
  document.getElementById('filtro-tipo').value = '';
  cargarStats(); cargarTramites();
}
document.getElementById('filtro-texto').addEventListener('input', renderTabla);
document.getElementById('filtro-tipo').addEventListener('change', cargarTramites);

// ── Panel detalle ──
async function abrirDetalle(id) {
  cerrarSplit();
  tramiteSeleccionado = id;
  renderTabla();

  const t = await apiFetch(`/api/tramites/${id}`);
  document.getElementById('panel-detalle').classList.add('visible');
  // Identificador legible (evitar UUID crudo)
  let idLegible = t.matricula || t.bastidor;
  if (!idLegible) {
    const esUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(id);
    idLegible = esUuid ? (t.asunto_email || 'Sin identificar') : id;
  }
  // Subtipo en el encabezado si existe y no es "ninguno"
  const tipoLabel = (t.subtipo && t.subtipo !== 'ninguno')
    ? t.tipo + ' · ' + t.subtipo
    : t.tipo;
  document.getElementById('detalle-titulo').textContent = idLegible + ' — ' + tipoLabel;
  document.getElementById('detalle-meta').textContent =
    `${t.gestoria} · ${t.estado_label}` +
    (t.num_comprobante_dgt ? ` · DGT: ${t.num_comprobante_dgt}` : '');

  // Documentos: el enlace "Ver" abre el split-view si tiene extracción
  const docsHtml = !t.documentos.length
    ? '<p style="color:var(--text-3);font-size:12px">Sin documentos recibidos.</p>'
    : t.documentos.map(d => {
        const verBtn = d.id
          ? `<span class="doc-link" onclick="abrirSplit('${d.id}','${d.nombre}')">Ver</span>`
          : '';
        return `<div class="doc-item">
          <span class="doc-validez doc-${d.validez}">${d.validez.replace('_',' ')}</span>
          <span class="doc-nombre" title="${d.nombre}">${d.nombre}</span>
          ${verBtn}
        </div>`;
      }).join('');

  const avisosHtml = !t.avisos_pendientes.length ? '' :
    '<p class="seccion-titulo">Avisos pendientes</p>' +
    t.avisos_pendientes.map(a =>
      `<div class="aviso-item"><span class="aviso-tipo">${a.tipo.toUpperCase()}</span>
       · ${a.requisito}
       <span style="color:var(--text-3);font-size:11px"> · ${formatHora(a.enviado_at)}</span></div>`
    ).join('');

  const histHtml = [...t.historial].reverse().map(h =>
    `<div class="evento-item">
      <div>${h.evento}</div>
      <div class="evento-hora">${formatHora(h.momento)} · ${h.actor}</div>
    </div>`
  ).join('');

  document.getElementById('detalle-cuerpo').innerHTML = `
    <p class="seccion-titulo">Documentos (${t.documentos.length})</p>
    ${docsHtml}
    ${avisosHtml}
    <p class="seccion-titulo">Historial</p>
    ${histHtml}
  `;

  const btn = document.getElementById('btn-escalar');
  btn.style.display = t.estado === 'pendiente_gestoria' ? 'block' : 'none';
  btn.disabled = false;
  btn.textContent = '⚠ Escalar al administrativo';
  btn.dataset.id = id;
}

function cerrarDetalle() {
  tramiteSeleccionado = null;
  cerrarSplit();
  document.getElementById('panel-detalle').classList.remove('visible');
  renderTabla();
}

// ── Split-view documental ──
async function abrirSplit(docId, nombre) {
  document.getElementById('split-titulo').textContent = nombre;
  document.getElementById('panel-split').classList.add('visible');
  document.getElementById('split-campos').innerHTML =
    '<p style="color:var(--text-3);font-size:12px">Cargando…</p>';

  let ext;
  try {
    ext = await apiFetch(`/api/documentos/${docId}/extraccion`);
  } catch(e) {
    document.getElementById('split-campos').innerHTML =
      `<p style="color:var(--danger)">Error al cargar extracción: ${e.message}</p>`;
    return;
  }

  // Panel izquierdo: placeholder (sin PDF real en modo prueba)
  const izq = document.getElementById('split-izq');
  if (ext.tiene_archivo) {
    izq.innerHTML = `<iframe src="/api/documentos/${docId}/archivo"
      style="width:100%;height:100%;border:none;"></iframe>`;
  } else {
    izq.innerHTML = `
      <div>
        <div style="font-size:40px;margin-bottom:10px">📄</div>
        <strong style="font-size:13px;color:var(--text-2)">${ext.nombre}</strong><br>
        <span style="font-size:11px;color:var(--text-3);margin-top:6px;display:block;line-height:1.6">
          Archivo no disponible en modo de prueba.<br>
          En producción se mostrará el PDF original.
        </span>
      </div>`;
  }

  // Panel derecho: banner de validez + campos extraídos
  const estadoIcon = { VALIDO: '✓', EVIDENCIA_COMPATIBLE: '⚠', RECHAZADO: '✗' };
  const bannerTxt  = { VALIDO: 'VÁLIDO', EVIDENCIA_COMPATIBLE: 'EVIDENCIA COMPATIBLE', RECHAZADO: 'RECHAZADO' };

  const campoIcon = { valido: '✓', evidencia: '⚠', rechazado: '✗', ilegible: '?' };
  const campoColor = {
    valido: 'var(--success)',
    evidencia: 'var(--warn)',
    rechazado: 'var(--danger)',
    ilegible: 'var(--text-3)'
  };

  const camposHtml = ext.campos_extraidos.map(c => `
    <div class="campo-item">
      <span class="campo-estado" style="color:${campoColor[c.estado]||'var(--text-3)'}">
        ${campoIcon[c.estado]||'?'}
      </span>
      <span class="campo-nombre">${c.campo}</span>
      <span class="campo-valor">${c.valor}</span>
    </div>`).join('');

  document.getElementById('split-campos').innerHTML = `
    <div class="validez-banner banner-${ext.validez}">
      ${estadoIcon[ext.validez]||''} ${bannerTxt[ext.validez]||ext.validez}
      <span style="font-weight:400;font-size:11px;margin-left:6px">
        · ${ext.tipo_detectado} · confianza ${ext.confianza} (${(ext.confianza_score*100).toFixed(0)}%)
      </span>
    </div>
    <p class="seccion-titulo">Campos extraídos</p>
    ${camposHtml || '<p style="color:var(--text-3);font-size:12px">Sin campos extraídos.</p>'}
    <div id="split-justificacion">${ext.justificacion}</div>
  `;
}

function cerrarSplit() {
  document.getElementById('panel-split').classList.remove('visible');
}

// ── Toast ──
let _toastTimer = null;
function mostrarToast(msg, tipo = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show toast-${tipo}`;
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Escalar ──
async function escalar() {
  const id = document.getElementById('btn-escalar').dataset.id;
  const btn = document.getElementById('btn-escalar');
  btn.disabled = true;
  btn.textContent = 'Escalando…';
  try {
    const r = await fetch(`/api/tramites/${id}/escalar`, {method:'POST'});
    const data = await r.json();
    if (data.ok) {
      mostrarToast('Trámite escalado al administrativo. Mensaje PREPARADO.', 'ok');
      await recargar();
      await abrirDetalle(id);
    } else {
      mostrarToast('No se pudo escalar: ' + (data.detail || 'error'), 'err');
      btn.disabled = false;
      btn.textContent = '⚠ Escalar al administrativo';
    }
  } catch(e) {
    mostrarToast('Error: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '⚠ Escalar al administrativo';
  }
}

// ── Indicador de salud ──
async function cargarSalud() {
  try {
    const r = await fetch('/api/salud');
    if (!r.ok) { actualizarSaludUI(null); return; }
    const d = await r.json();
    actualizarSaludUI(d);
  } catch { actualizarSaludUI(null); }
}
function actualizarSaludUI(d) {
  const el = document.getElementById('indicador-salud');
  if (!el) return;
  if (!d) { el.textContent = '● error'; el.style.color = 'var(--danger)'; return; }
  const color = d.clasificador === 'mock' ? 'rgba(255,255,255,0.4)' : 'var(--success)';
  const nombre = d.clasificador === 'mock' ? 'mock' : `${d.clasificador} · ${d.modelo}`;
  el.style.color = color;
  el.textContent = `● Tyrion activo · ${nombre} · ${d.procesados_hoy} procesados`;
}

// ── Polling ──
async function recargar() {
  await Promise.all([cargarStats(), cargarTramites(), cargarSalud()]);
  document.getElementById('ultima-actualizacion').textContent =
    'última act.: ' + new Date().toLocaleTimeString('es-ES');
}
recargar();
setInterval(recargar, 30_000);
</script>
